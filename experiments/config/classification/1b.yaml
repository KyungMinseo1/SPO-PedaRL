classifier:
  model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  vllm:
    temperature: 1.0
    max_length: 12000
    max_num_seqs: 512
    gpu_memory_utilization: 0.5
    number_of_gpus_per_instance: 1
    max_number_of_instances: -1
    load_and_unload: false
    use_v0: false
    enforce_eager: false

logging:
  wandb: true
  wandb_project: classification_LAB
  wandb_run_name: Qwen2.5-0.5B-Instruct
  run_group: 0.5b
  wandb_tags: ["0.5b"]
  save_dir: checkpoints/0.5b_classification
  save_steps: 10


generation:
  use_experimental_shared_memory: false

  n_turns_to_sample: 8